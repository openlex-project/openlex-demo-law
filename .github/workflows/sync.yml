name: Sync Laws
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: openlex-project/openlex-lawsync@main
        with:
          deploy-hook: ${{ secrets.VERCEL_DEPLOY_HOOK }}
          gii-proxy-url: "https://openlex-gii-proxy.lexict.workers.dev"
