- label:
    de: KAPITEL I
    en: CHAPTER I
    fr: CHAPITRE I
  title:
    de: Allgemeine Bestimmungen
    en: General provisions
    fr: Dispositions générales
  children:
    - nr: "1"
      title:
        de: Gegenstand und Ziele
        en: Subject-matter and objectives
        fr: Objet et objectifs
    - nr: "2"
      title:
        de: Sachlicher Anwendungsbereich
        en: Material scope
        fr: Champ d'application matériel
    - nr: "3"
      title:
        de: Räumlicher Anwendungsbereich
        en: Territorial scope
        fr: Champ d'application territorial
    - nr: "4"
      title:
        de: Begriffsbestimmungen
        en: Definitions
        fr: Définitions
- label:
    de: KAPITEL II
    en: CHAPTER II
    fr: CHAPITRE II
  title:
    de: Grundsätze
    en: Principles
    fr: Principes
  children:
    - nr: "5"
      title:
        de: Grundsätze für die Verarbeitung personenbezogener Daten
        en: Principles relating to processing of personal data
        fr: Principes relatifs au traitement des données à caractère personnel
    - nr: "6"
      title:
        de: Rechtmäßigkeit der Verarbeitung
        en: Lawfulness of processing
        fr: Licéité du traitement
    - nr: "7"
      title:
        de: Bedingungen für die Einwilligung
        en: Conditions for consent
        fr: Conditions applicables au consentement
    - nr: "8"
      title:
        de: Bedingungen für die Einwilligung eines Kindes in Bezug auf Dienste der Informationsgesellschaft
        en: Conditions applicable to child's consent in relation to information society services
        fr: Conditions applicables au consentement des enfants en ce qui concerne les services de la société de l'information
    - nr: "9"
      title:
        de: Verarbeitung besonderer Kategorien personenbezogener Daten
        en: Processing of special categories of personal data
        fr: Traitement portant sur des catégories particulières de données à caractère personnel
    - nr: "10"
      title:
        de: Verarbeitung von personenbezogenen Daten über strafrechtliche Verurteilungen und Straftaten
        en: Processing of personal data relating to criminal convictions and offences
        fr: Traitement des données à caractère personnel relatives aux condamnations pénales et aux infractions
    - nr: "11"
      title:
        de: Verarbeitung, für die eine Identifizierung der betroffenen Person nicht erforderlich ist
        en: Processing which does not require identification
        fr: Traitement ne nécessitant pas l'identification
- label:
    de: KAPITEL III
    en: CHAPTER III
    fr: CHAPITRE III
  title:
    de: Rechte der betroffenen Person
    en: Rights of the data subject
    fr: Droits de la personne concernée
  children:
    - label:
        de: Abschnitt 1
        en: Section 1
        fr: Section 1
      title:
        de: Transparenz und Modalitäten
        en: Transparency and modalities
        fr: Transparence et modalités
      children:
        - nr: "12"
          title:
            de: Transparente Information, Kommunikation und Modalitäten für die Ausübung der Rechte der betroffenen Person
            en: Transparent information, communication and modalities for the exercise of the rights of the data subject
            fr: Transparence des informations et des communications et modalités de l'exercice des droits de la personne concernée
    - label:
        de: Abschnitt 2
        en: Section 2
        fr: Section 2
      title:
        de: Informationspflicht und Recht auf Auskunft zu personenbezogenen Daten
        en: Information and access to personal data
        fr: Information et accès aux données à caractère personnel
      children:
        - nr: "13"
          title:
            de: Informationspflicht bei Erhebung von personenbezogenen Daten bei der betroffenen Person
            en: Information to be provided where personal data are collected from the data subject
            fr: Informations à fournir lorsque des données à caractère personnel sont collectées auprès de la personne concernée
        - nr: "14"
          title:
            de: Informationspflicht, wenn die personenbezogenen Daten nicht bei der betroffenen Person erhoben wurden
            en: Information to be provided where personal data have not been obtained from the data subject
            fr: Informations à fournir lorsque les données à caractère personnel n'ont pas été collectées auprès de la personne concernée
        - nr: "15"
          title:
            de: Auskunftsrecht der betroffenen Person
            en: Right of access by the data subject
            fr: Droit d'accès de la personne concernée
    - label:
        de: Abschnitt 3
        en: Section 3
        fr: Section 3
      title:
        de: Berichtigung und Löschung
        en: Rectification and erasure
        fr: Rectification et effacement
      children:
        - nr: "16"
          title:
            de: Recht auf Berichtigung
            en: Right to rectification
            fr: Droit de rectification
        - nr: "17"
          title: ""
        - nr: "18"
          title:
            de: Recht auf Einschränkung der Verarbeitung
            en: Right to restriction of processing
            fr: Droit à la limitation du traitement
        - nr: "19"
          title:
            de: Mitteilungspflicht im Zusammenhang mit der Berichtigung oder Löschung personenbezogener Daten oder der Einschränkung der Verarbeitung
            en: Notification obligation regarding rectification or erasure of personal data or restriction of processing
            fr: Obligation de notification en ce qui concerne la rectification ou l'effacement de données à caractère personnel ou la limitation du traitement
        - nr: "20"
          title:
            de: Recht auf Datenübertragbarkeit
            en: Right to data portability
            fr: Droit à la portabilité des données
    - label:
        de: Abschnitt 4
        en: Section 4
        fr: Section 4
      title:
        de: Widerspruchsrecht und automatisierte Entscheidungsfindung im Einzelfall
        en: Right to object and automated individual decision-making
        fr: Droit d'opposition et prise de décision individuelle automatisée
      children:
        - nr: "21"
          title:
            de: Widerspruchsrecht
            en: Right to object
            fr: Droit d'opposition
        - nr: "22"
          title:
            de: Automatisierte Entscheidungen im Einzelfall einschließlich Profiling
            en: Automated individual decision-making, including profiling
            fr: Décision individuelle automatisée, y compris le profilage
    - label:
        de: Abschnitt 5
        en: Section 5
        fr: Section 5
      title:
        de: Beschränkungen
        en: Restrictions
        fr: Limitations
      children:
        - nr: "23"
          title:
            de: Beschränkungen
            en: Restrictions
            fr: Limitations
- label:
    de: KAPITEL IV
    en: CHAPTER IV
    fr: CHAPITRE IV
  title:
    de: Verantwortlicher und Auftragsverarbeiter
    en: Controller and processor
    fr: Responsable du traitement et sous-traitant
  children:
    - label:
        de: Abschnitt 1
        en: Section 1
        fr: Section 1
      title:
        de: Allgemeine Pflichten
        en: General obligations
        fr: Obligations générales
      children:
        - nr: "24"
          title:
            de: Verantwortung des für die Verarbeitung Verantwortlichen
            en: Responsibility of the controller
            fr: Responsabilité du responsable du traitement
        - nr: "25"
          title:
            de: Datenschutz durch Technikgestaltung und durch datenschutzfreundliche Voreinstellungen
            en: Data protection by design and by default
            fr: Protection des données dès la conception et protection des données par défaut
        - nr: "26"
          title:
            de: Gemeinsam für die Verarbeitung Verantwortliche
            en: Joint controllers
            fr: Responsables conjoints du traitement
        - nr: "27"
          title:
            de: Vertreter von nicht in der Union niedergelassenen Verantwortlichen oder Auftragsverarbeitern
            en: Representatives of controllers or processors not established in the Union
            fr: Représentants des responsables du traitement ou des sous-traitants qui ne sont pas établis dans l'Union
        - nr: "28"
          title:
            de: Auftragsverarbeiter
            en: Processor
            fr: Sous-traitant
        - nr: "29"
          title:
            de: Verarbeitung unter der Aufsicht des Verantwortlichen oder des Auftragsverarbeiters
            en: Processing under the authority of the controller or processor
            fr: Traitement effectué sous l'autorité du responsable du traitement ou du sous-traitant
        - nr: "30"
          title:
            de: Verzeichnis von Verarbeitungstätigkeiten
            en: Records of processing activities
            fr: Registre des activités de traitement
        - nr: "31"
          title:
            de: Zusammenarbeit mit der Aufsichtsbehörde
            en: Cooperation with the supervisory authority
            fr: Coopération avec l'autorité de contrôle
    - label:
        de: Abschnitt 2
        en: Section 2
        fr: Section 2
      title:
        de: Sicherheit personenbezogener Daten
        en: Security of personal data
        fr: Sécurité des données à.caractère personnel
      children:
        - nr: "32"
          title:
            de: Sicherheit der Verarbeitung
            en: Security of processing
            fr: Sécurité du traitement
        - nr: "33"
          title:
            de: Meldung von Verletzungen des Schutzes personenbezogener Daten an die Aufsichtsbehörde
            en: Notification of a personal data breach to the supervisory authority
            fr: Notification à l'autorité de contrôle d'une violation de données à caractère personnel
        - nr: "34"
          title:
            de: Benachrichtigung der von einer Verletzung des Schutzes personenbezogener Daten betroffenen Person
            en: Communication of a personal data breach to the data subject
            fr: Communication à la personne concernée d'une violation de données à caractère personnel
    - label:
        de: Abschnitt 3
        en: Section 3
        fr: Section 3
      title:
        de: Datenschutz-Folgenabschätzung und vorherige Konsultation
        en: Data protection impact assessment and prior consultation
        fr: Analyse d'impact relative à la protection des donnés et consultation préalable
      children:
        - nr: "35"
          title:
            de: Datenschutz-Folgenabschätzung
            en: Data protection impact assessment
            fr: Analyse d'impact relative à la protection des données
        - nr: "36"
          title:
            de: Vorherige Konsultation
            en: Prior consultation
            fr: Consultation préalable
    - label:
        de: Abschnitt 4
        en: Section 4
        fr: Section 4
      title:
        de: Datenschutzbeauftragter
        en: Data protection officer
        fr: Délégué à la protection des données
      children:
        - nr: "37"
          title:
            de: Benennung eines Datenschutzbeauftragten
            en: Designation of the data protection officer
            fr: Désignation du délégué à la protection des données
        - nr: "38"
          title:
            de: Stellung des Datenschutzbeauftragten
            en: Position of the data protection officer
            fr: Fonction du délégué à la protection des données
        - nr: "39"
          title:
            de: Aufgaben des Datenschutzbeauftragten
            en: Tasks of the data protection officer
            fr: Missions du délégué à la protection des données
    - label:
        de: Abschnitt 5
        en: Section 5
        fr: Section 5
      title:
        de: Verhaltensregeln und Zertifizierung
        en: Codes of conduct and certification
        fr: Codes de conduite et certification
      children:
        - nr: "40"
          title:
            de: Verhaltensregeln
            en: Codes of conduct
            fr: Codes de conduite
        - nr: "41"
          title:
            de: Überwachung der genehmigten Verhaltensregeln
            en: Monitoring of approved codes of conduct
            fr: Suivi des codes de conduite approuvés
        - nr: "42"
          title:
            de: Zertifizierung
            en: Certification
            fr: Certification
        - nr: "43"
          title:
            de: Zertifizierungsstellen
            en: Certification bodies
            fr: Organismes de certification
- label:
    de: KAPITEL V
    en: CHAPTER V
    fr: CHAPITRE V
